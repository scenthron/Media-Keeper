name: Build and Release Media Keeper

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Run build script
      shell: pwsh
      run: |
        $env:PYTHONUTF8 = "1"
        $env:PYTHONIOENCODING = "utf-8"
        python src/build.py

    - name: Find and Zip EXE
      shell: pwsh
      run: |
        $exeFile = Get-ChildItem -Path dist\*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $exeFile) {
          $exeFile = Get-ChildItem -Recurse -Path dist\*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if (-not $exeFile) {
          Write-Error "EXE file not found in dist folder!"
          exit 1
        }
        Write-Host "Found: $($exeFile.FullName)"

        $tag = "${{ github.event.release.tag_name }}"
        if (-not $tag) {
          $tag = "release"
        }

        $zipName = "Media_Keeper_$tag.zip"
        Compress-Archive -Path $exeFile.FullName -DestinationPath $zipName -Force
        Write-Host "Archive created: $zipName"

        Add-Content -Path $env:GITHUB_ENV -Value "ZIP_NAME=$zipName"

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ZIP_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
