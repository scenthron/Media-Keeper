name: Build and Release Media Keeper

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Run build script
      working-directory: src
      env:
        PYTHONUTF8: "1"
      run: |
        python build.py

    - name: Find and Zip EXE
      shell: pwsh
      run: |
        $exeFile = Get-ChildItem -Path dist\*.exe | Select-Object -First 1
        if (-not $exeFile) {
          Write-Error "Исполняемый файл .exe не найден в папке dist!"
          exit 1
        }
        Write-Host "Найден файл: $($exeFile.FullName)"
        
        $tag = "${{ github.event.release.tag_name }}"
        if (-not $tag) {
          $tag = "release"
        }
        
        $zipName = "Media_Keeper_$tag.zip"
        Compress-Archive -Path $exeFile.FullName -DestinationPath $zipName -Force
        Write-Host "Создан архив: $zipName"
        
        Add-Content -Path $env:GITHUB_ENV -Value "ZIP_NAME=$zipName"

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ZIP_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
